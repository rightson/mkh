name: 更新逐字稿

# 定期補齊逐字稿資料，有新集數就自動 commit。
# 兩段式（來源階層：第一手音訊為主、逐字稿站為輔）：
#   ① 主抓 scrape.js：Podcast 第一手音訊（Apple/Spotify 索引的同一份 RSS；
#      設定 TRANSCRIBE_API_KEY 時下載音檔轉逐字稿，否則寫節目摘要 stub）。
#   ② 備援 fallback.js：逐字稿站 whatmkreallysaid.com，補齊主抓拿不到的集數，
#      並升級待補 stub；已成功轉錄的第一手音訊版不覆蓋。
on:
  schedule:
    # 台灣時間週三、週六晚 22:00（= 14:00 UTC；股癌約每週兩集，抓兩次較不會漏）
    # 註：排程只會依 default branch(main) 上的設定執行，改動需合併進 main 才生效。
    - cron: '0 14 * * 3,6'
  workflow_dispatch:        # 也可在 Actions 頁面手動觸發

permissions:
  contents: write

# 避免多個排程同時跑造成 push 衝突
concurrency:
  group: update-transcripts
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 主抓——Podcast 第一手音訊
        # 從 RSS 取最新單集，設定 TRANSCRIBE_API_KEY 後下載音檔轉逐字稿，
        # 否則寫節目摘要 stub（待備援或日後轉錄升級）。失敗不擋整個流程，
        # 讓備援仍能補上。
        continue-on-error: true
        env:
          TRANSCRIBE_API_KEY: ${{ secrets.TRANSCRIBE_API_KEY }}
          TRANSCRIBE_API_URL: ${{ secrets.TRANSCRIBE_API_URL }}
          TRANSCRIBE_MODEL: ${{ secrets.TRANSCRIBE_MODEL }}
          TRANSCRIBE_MAX_MB: ${{ secrets.TRANSCRIBE_MAX_MB }}
        run: node scrape.js

      - name: 備援——逐字稿站補齊
        run: node fallback.js

      - name: 有變更則 commit 並 push
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "沒有新集數，結束。"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          count=$(ls transcripts/EP*.md 2>/dev/null | wc -l | tr -d ' ')
          git commit -m "自動更新逐字稿（共 ${count} 集）"
          git push
